<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacta - SeguraDron</title>
    <link rel="icon" type="image/png" href="images/seguradron_logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="navbar">
            <a href="index.html" class="logo-link">
                <img src="images/seguradron_logo.png" alt="SeguraDron Logo" class="logo" data-logo-dark="images/seguradron_logo.png" data-logo-light="images/seguradron_logo_claro.png">
            </a>
            <nav class="main-nav">
                <a href="index.html">Inicio</a>
                <a href="nosotros.html">Nosotros</a>
                <a href="contacta.html">Contacta</a>
                <button type="button" class="theme-toggle" aria-label="Cambiar tema"></button>
            </nav>
        </div>
    </header>

    <main id="mainView">
        <div class="container">
            <h1 class="titulo">Contacta con nosotros</h1>
            <p class="lead">Estamos aqui para ayudarte. Enviamos un mensaje.</p>

            <form class="formulario-contacto" id="contactForm">
                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar Mensaje</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 SeguraDron. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        const themeToggle = document.querySelector('.theme-toggle');
        if (themeToggle) {
            const storedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const initialTheme = storedTheme || systemTheme;

            document.documentElement.dataset.theme = initialTheme;

            const updateToggleLabel = () => {
                const isDark = document.documentElement.dataset.theme === 'dark';
                themeToggle.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
            };

            const updateLogo = () => {
                const logo = document.querySelector('.logo');
                if (!logo) {
                    return;
                }

                const isDark = document.documentElement.dataset.theme === 'dark';
                const nextSrc = isDark ? logo.dataset.logoDark : logo.dataset.logoLight;

                if (nextSrc && logo.getAttribute('src') !== nextSrc) {
                    logo.setAttribute('src', nextSrc);
                }
            };

            updateToggleLabel();
            updateLogo();

            themeToggle.addEventListener('click', () => {
                const nextTheme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
                document.documentElement.dataset.theme = nextTheme;
                localStorage.setItem('theme', nextTheme);
                updateToggleLabel();
                updateLogo();
            });
        }

        const contactForm = document.getElementById('contactForm');
        emailjs.init('pp2PWV_iNTnc0OzFx');
        contactForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const formData = new FormData(contactForm);
            const payload = Object.fromEntries(formData.entries());

            try {
                await emailjs.send('service_u3v545s', 'template_iiux02s', {
                    name: payload.name,
                    email: payload.email,
                    message: payload.message,
                });

                contactForm.reset();
                alert('Mensaje enviado correctamente.');
            } catch (error) {
                alert('Error al enviar el mensaje. Intenta de nuevo.');
            }
        });
    </script>
</body>
</html>
